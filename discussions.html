<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discussions - TrueVine</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 font-sans">

<header class="bg-blue-800 text-white shadow p-4 flex items-center justify-between">
  <h1 class="text-2xl font-bold cursor-pointer" onclick="location.href='index.html'">TrueVine Discussions</h1>
  <div class="flex items-center space-x-2">
    <div id="userAvatarHeader" class="w-10 h-10 rounded-full bg-blue-400 flex items-center justify-center font-bold">J</div>
    <span id="usernameHeader" class="font-semibold"></span>
  </div>
</header>

<main class="max-w-2xl mx-auto p-4">
  <!-- New Discussion Input -->
  <div class="bg-white p-4 rounded-2xl shadow mb-4 border-l-4 border-blue-400">
    <textarea id="discussionInput" class="w-full border p-2 rounded-md" placeholder="Start a new discussion..."></textarea>
    <button id="discussionBtn" class="bg-blue-600 text-white px-3 py-1 rounded w-full mt-2 hover:bg-blue-700">Post Discussion</button>
  </div>

  <!-- Discussion Feed -->
  <div id="discussionFeed"></div>
</main>

<script>
  // LOGIN
  let username = localStorage.getItem('username') || '';
  if(username){ 
    document.getElementById('usernameHeader').textContent = username; 
    document.getElementById('userAvatarHeader').textContent = username.charAt(0).toUpperCase(); 
  } else { 
    alert('Please login first'); 
    location.href='index.html'; 
  }

  // HELPER: relative time
  function timeAgo(date){
    const seconds=Math.floor((new Date() - new Date(date))/1000);
    if(seconds<60) return `${seconds} seconds ago`;
    const minutes=Math.floor(seconds/60);
    if(minutes<60) return `${minutes} minutes ago`;
    const hours=Math.floor(minutes/60);
    if(hours<24) return `${hours} hours ago`;
    const days=Math.floor(hours/24);
    return `${days} day${days>1?'s':''} ago`;
  }

  // SIMULATED USERS
  const sampleUsers = ['Faith','Samuel','Grace','David','Ruth','Peter'];
  const colors = ['bg-red-400','bg-green-400','bg-yellow-400','bg-purple-400','bg-pink-400','bg-orange-400'];

  // STORAGE
  let discussions = JSON.parse(localStorage.getItem('discussions')) || [
    {user:'Faith',content:'God answered my prayer today!',likes:2,comments:[],date:new Date()},
    {user:'Samuel',content:'I learned a new Bible verse about patience.',likes:1,comments:[],date:new Date()},
    {user:'Grace',content:'Feeling blessed this morning.',likes:3,comments:[],date:new Date()}
  ];
  localStorage.setItem('discussions',JSON.stringify(discussions));

  const discussionFeed = document.getElementById('discussionFeed');

  document.getElementById('discussionBtn').addEventListener('click',()=>{
    const input = document.getElementById('discussionInput'); 
    if(!input.value.trim()) return alert('Enter discussion');
    discussions.unshift({user:username,content:input.value,likes:0,comments:[],date:new Date()});
    localStorage.setItem('discussions',JSON.stringify(discussions));
    input.value='';
    renderDiscussions();
  });

  function renderDiscussions(){
    discussionFeed.innerHTML = discussions.map((d,i)=>`
      <div class="bg-blue-50 p-4 rounded-2xl shadow mb-4 border-l-4 border-blue-300">
        <div class="flex items-center space-x-2 mb-2">
          <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold ${sampleUsers.includes(d.user)?colors[sampleUsers.indexOf(d.user)%colors.length]:'bg-blue-400'}">
            ${d.user.charAt(0).toUpperCase()}
          </div>
          <div>
            <p class="font-semibold">${d.user}</p>
            <p class="text-sm text-gray-600">${timeAgo(d.date)}</p>
          </div>
        </div>
        <p class="mb-2">${d.content}</p>
        <div class="flex space-x-2 mb-2">
          <button onclick="likeDiscussion(${i})" class="bg-blue-400 text-white px-2 py-1 rounded hover:bg-blue-500">👍 Like (${d.likes||0})</button>
          ${d.user===username?`<button onclick="deleteDiscussion(${i})" class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">Delete</button>`:''}
        </div>

        <!-- COMMENTS -->
        <div class="ml-4 mt-2">
          ${(d.comments||[]).map((c,j)=>`
            <div class="flex items-start space-x-2 mb-1">
              <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold ${sampleUsers.includes(c.user)?colors[sampleUsers.indexOf(c.user)%colors.length]:'bg-blue-300'} text-white text-sm">
                ${c.user.charAt(0).toUpperCase()}
              </div>
              <div>
                <p class="text-sm"><span class="font-semibold">${c.user}:</span> ${c.text} <span class="text-gray-500 text-xs">(${timeAgo(c.date)})</span></p>
              </div>
            </div>
          `).join('')}
          <div class="flex items-center space-x-2 mt-1">
            <input type="text" placeholder="Add a comment..." id="commentInput-${i}" class="flex-1 border p-1 rounded text-sm">
            <button onclick="submitComment(${i})" class="bg-blue-400 text-white px-2 py-1 rounded hover:bg-blue-500">Post</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function likeDiscussion(i){ 
    discussions[i].likes+=1; 
    localStorage.setItem('discussions',JSON.stringify(discussions)); 
    renderDiscussions(); 
  }

  function deleteDiscussion(i){ 
    if(confirm('Delete discussion?')){
      discussions.splice(i,1); 
      localStorage.setItem('discussions',JSON.stringify(discussions)); 
      renderDiscussions(); 
    }
  }

  function submitComment(i){
    const input=document.getElementById(`commentInput-${i}`);
    if(input && input.value.trim()){ 
      discussions[i].comments.push({user:username,text:input.value,date:new Date()}); 
      localStorage.setItem('discussions',JSON.stringify(discussions)); 
      renderDiscussions();
    }
  }

  renderDiscussions();

</script>
</body>
</html>
